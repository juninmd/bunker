name: BunkerPass Release Automation

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple
          package-name: bunkerpass

      - name: Update README
        if: ${{ steps.release.outputs.release_created }}
        run: |
          node scripts/update-readme.js
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md apps/extension/manifest.json
          git commit -m "chore: update readme and manifest version to ${{ steps.release.outputs.version }}" || echo "No changes to commit"
          git push
