name: Release Please

# BunkerPass Release Automation
# Este workflow automatiza a criação de PRs de release,
# gera tags automaticamente ao aprovar o PR, e mantém
# o versionamento no README sempre atualizado.
# Integrado via scripts/update-readme.js e release-please.
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          release-type: simple
          package-name: bunkerpass

      - name: Update README
        if: ${{ steps.release.outputs.release_created }}
        run: |
          # Geração de atualização do README automaticamente conforme requisito
          node scripts/update-readme.js
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md apps/extension/manifest.json
          git commit -m "chore: update readme and manifest version to ${{ steps.release.outputs.version }}"
          git push
