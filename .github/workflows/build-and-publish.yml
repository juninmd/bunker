name: Build and Publish Artifacts

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build browser extension package
        run: ./scripts/package-extension.sh "${{ steps.version.outputs.value }}"

      - name: Build desktop placeholder artifact
        run: |
          mkdir -p dist
          echo "Desktop build placeholder for version ${{ steps.version.outputs.value }}" > dist/bunkerpass-desktop-${{ steps.version.outputs.value }}.txt

      - name: Build Android placeholder artifact
        run: |
          mkdir -p dist
          echo "Android APK placeholder for version ${{ steps.version.outputs.value }}" > dist/bunkerpass-android-${{ steps.version.outputs.value }}.apk

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/bunkerpass-extension-${{ steps.version.outputs.value }}.zip
            dist/bunkerpass-desktop-${{ steps.version.outputs.value }}.txt
            dist/bunkerpass-android-${{ steps.version.outputs.value }}.apk
            dist/SHA256SUMS.txt
