name: BunkerPass Release Process

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  automated-release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release Please
        uses: google-github-actions/release-please-action@v4
        id: release
        with:
          release-type: simple
          package-name: bunkerpass

      - name: Update README and Version
        if: ${{ steps.release.outputs.release_created }}
        run: |
          node scripts/update-readme.js
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md apps/extension/manifest.json
          git commit -m "chore: update readme and manifest version to ${{ steps.release.outputs.version }}" || echo "No changes to commit"
          git push

  build-artifacts:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build browser extension package
        run: ./scripts/package-extension.sh "${{ steps.version.outputs.value }}"

      - name: Build desktop artifact
        run: |
          mkdir -p dist
          if [ -d "apps/desktop" ]; then
            cd apps/desktop
            if [ -f "package.json" ]; then npm install; fi
            zip -r ../../dist/bunkerpass-desktop-${{ steps.version.outputs.value }}.zip . -x "node_modules/*" ".git/*" "dist/*"
          else
            echo "Desktop Placeholder" > dist/bunkerpass-desktop-${{ steps.version.outputs.value }}.txt
          fi

      - name: Build Android APK
        run: |
          mkdir -p dist
          if [ -f "apps/android/package.json" ]; then
            cd apps/android
            npm install
            npm run build:apk || echo "Mock APK" > bunkerpass-android-${{ steps.version.outputs.value }}.apk
            cp dist/*.apk ../../dist/ || cp *.apk ../../dist/ || true
          else
            echo "Android APK placeholder" > dist/bunkerpass-android-${{ steps.version.outputs.value }}.apk
          fi

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
