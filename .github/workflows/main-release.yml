name: BunkerPass Unified Release Automation

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Release Please Action
        id: release
        uses: google-github-actions/release-please-action@v4
        with:
          release-type: simple
          package-name: bunkerpass

      - name: Update README with New Tag
        if: ${{ steps.release.outputs.release_created }}
        run: |
          node scripts/update-readme.js
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md apps/extension/manifest.json
          git commit -m "chore: update readme and manifest version to ${{ steps.release.outputs.version }}"
          git push
