name: Release Please

# BunkerPass Release Automation
# Este workflow cria e automatiza a geração das releases de forma integrada.
# Gere tags automaticamente ao aprovar o PR, mantendo versionamento alinhado.
# Matenha o readme atualizado executando um script.
# Integrado via scripts/update-readme.js e release-please.
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          release-type: simple
          package-name: bunkerpass

      - name: Generate Tags Automatically
        if: ${{ steps.release.outputs.release_created }}
        run: echo "Gere tags automaticamente (gerada pela action google-github-actions/release-please-action)"

      - name: Matenha o readme atualizado
        if: ${{ steps.release.outputs.release_created }}
        run: |
          # Geração automatizada das releases e atualização do README
          node scripts/update-readme.js
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md apps/extension/manifest.json
          git commit -m "chore: update readme and manifest version to ${{ steps.release.outputs.version }}"
          git push
