name: Geração Automatizada de Releases e Tags

# BunkerPass Release Automation
# 1. Geração automatizada das releases (Release Please)
# 2. Gera tags automaticamente ao aprovar o PR (Release Please)
# 3. Mantém o README atualizado executando update-readme.js
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Geração Automatizada de Releases e Tags
        uses: google-github-actions/release-please-action@v4
        id: release
        with:
          release-type: simple
          package-name: bunkerpass

      - name: Mantenha o README atualizado
        if: ${{ steps.release.outputs.release_created }}
        run: |
          # Atualização automatizada do README
          node scripts/update-readme.js
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md apps/extension/manifest.json
          git commit -m "chore: atualiza readme e manifest version para ${{ steps.release.outputs.version }}"
          git push
