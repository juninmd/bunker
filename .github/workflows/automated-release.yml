name: Release Please

# BunkerPass Release Automation
# Este workflow cria e automatiza a geração das releases de forma integrada.
# Funcionalidade: Gere tags automaticamente ao aprovar o PR, mantendo versionamento alinhado.
# Funcionalidade: Mantenha o readme atualizado executando um script.
# Integrado via scripts/update-readme.js e release-please.
# Adicionando suporte explícito para automatizar as releases, tags e readme.
on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release-please:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple
          package-name: bunkerpass

      - name: Update README (Mantenha o readme atualizado)
        if: ${{ steps.release.outputs.release_created }}
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          # Geração automatizada das releases e atualização do README
          node scripts/update-readme.js
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md apps/extension/manifest.json
          git commit -m "chore: update readme and manifest version to $RELEASE_VERSION" || echo "No changes to commit"
          git push
