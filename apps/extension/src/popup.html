<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BunkerPass</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="container">
      <h1>BunkerPass</h1>
      <p class="subtitle">MVP de cofre local criptografado (offline-first)</p>

      <section id="unlock-section">
        <label for="masterPassword">Senha mestra</label>
        <input id="masterPassword" type="password" autocomplete="off" />
        <button id="unlockButton">Desbloquear</button>
      </section>

      <section id="vault-section" class="hidden">
        <h2>Novo login</h2>
        <form id="credentialForm">
          <input id="site" placeholder="Site (ex: github.com)" required />
          <input id="username" placeholder="Usuário" required />
          <div class="password-wrapper">
            <input id="password" type="password" placeholder="Senha" required />
            <button type="button" id="generateBtn" class="icon-btn" title="Gerar senha segura">⚡</button>
          </div>
          <div id="generatorOptions" class="generator-options hidden">
            <div class="slider-row">
              <label for="lengthRange">Tamanho: <span id="lengthVal">16</span></label>
              <input type="range" id="lengthRange" min="8" max="64" value="16">
            </div>
            <div class="checkbox-row">
              <label><input type="checkbox" id="useUppercase" checked> A-Z</label>
              <label><input type="checkbox" id="useLowercase" checked> a-z</label>
              <label><input type="checkbox" id="useNumbers" checked> 0-9</label>
              <label><input type="checkbox" id="useSymbols" checked> !@#</label>
            </div>
          </div>
          <button type="submit">Salvar</button>
        </form>

        <h2>Credenciais</h2>
        <input type="text" id="searchInput" placeholder="Buscar..." aria-label="Buscar credenciais" style="margin-bottom: 8px;">
        <ul id="credentialList"></ul>
        <button id="syncButton">Sincronizar com Google Drive</button>
        <button id="importCsvButton" class="secondary" style="margin-top: 8px;">Importar CSV do Drive</button>
        <div id="last-sync" class="last-sync"></div>
        <button id="lockButton" class="secondary">Bloquear</button>
      </section>

      <p id="status" role="status" aria-live="polite"></p>
    </main>

    <script src="popup.js" type="module"></script>
  </body>
</html>
