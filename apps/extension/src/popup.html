<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BunkerPass</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="container">
      <h1>BunkerPass</h1>
      <p class="subtitle">MVP de cofre local criptografado (offline-first)</p>

      <section id="unlock-section">
        <label for="masterPassword">Senha mestra</label>
        <input id="masterPassword" type="password" autocomplete="off" />
        <button id="unlockButton">Desbloquear</button>
      </section>

      <section id="vault-section" class="hidden">
        <h2>Novo item</h2>
        <form id="credentialForm">
          <input type="hidden" id="credentialId" />
          <div class="type-selector" style="margin-bottom: 8px;">
            <label><input type="radio" name="itemType" value="password" checked> Senha</label>
            <label style="margin-left: 10px;"><input type="radio" name="itemType" value="note"> Nota Segura</label>
            <label style="margin-left: 10px;"><input type="radio" name="itemType" value="card"> Cartão</label>
          </div>

          <input id="site" placeholder="Site (ex: github.com)" required />

          <!-- Folder / Group Input -->
          <input id="folder" list="folderOptions" placeholder="Pasta (Opcional)" />
          <datalist id="folderOptions"></datalist>

          <div class="username-wrapper" id="usernameWrapper" style="display: flex; gap: 8px;">
            <input id="username" placeholder="Usuário" required style="flex: 1;" />
            <button type="button" id="generateUsernameBtn" class="icon-btn" title="Gerar nome de usuário seguro">⚡</button>
          </div>

          <div class="password-wrapper" id="passwordWrapper">
            <input id="password" type="password" placeholder="Senha" required />
            <button type="button" id="generateBtn" class="icon-btn" title="Gerar senha segura">⚡</button>
          </div>

          <div id="cardFields" class="hidden" style="display: flex; flex-direction: column; gap: 8px;">
            <input id="cardName" placeholder="Nome no Cartão" />
            <input id="cardNumber" placeholder="Número do Cartão" />
            <div style="display: flex; gap: 8px;">
              <input id="cardExp" placeholder="MM/AA" style="flex: 1;" />
              <input id="cardCvv" placeholder="CVV" style="flex: 1;" />
            </div>
          </div>

          <div class="password-strength-container hidden" id="passwordStrengthContainer">
            <div id="password-strength-bar"></div>
            <span id="password-strength-text"></span>
          </div>

          <div id="generatorOptions" class="generator-options hidden">
            <div class="slider-row">
              <label for="lengthRange">Tamanho: <span id="lengthVal">16</span></label>
              <input type="range" id="lengthRange" min="8" max="64" value="16">
            </div>
            <div class="checkbox-row">
              <label><input type="checkbox" id="useUppercase" checked> A-Z</label>
              <label><input type="checkbox" id="useLowercase" checked> a-z</label>
              <label><input type="checkbox" id="useNumbers" checked> 0-9</label>
              <label><input type="checkbox" id="useSymbols" checked> !@#</label>
            </div>
          </div>
          <textarea id="notes" placeholder="Notas (opcional)" rows="3" style="width: 100%; margin-top: 8px;"></textarea>
          <button type="submit">Salvar</button>
        </form>

        <h2>Credenciais</h2>
        <input type="text" id="searchInput" placeholder="Buscar..." aria-label="Buscar credenciais" style="margin-bottom: 8px;">
        <ul id="credentialList"></ul>
        <button id="syncButton">Sincronizar com Google Drive</button>
        <button id="importCsvButton" class="secondary" style="margin-top: 8px;">Importar CSV do Drive</button>
        <div id="last-sync" class="last-sync"></div>
        <button id="securityDashboardBtn" class="secondary" style="margin-top: 8px; width: 100%;">Painel de Segurança</button>
        <button id="lockButton" class="secondary" style="margin-top: 8px; width: 100%;">Bloquear</button>
      </section>

      <section id="security-dashboard-section" class="hidden">
        <h2>Painel de Segurança</h2>
        <div class="dashboard-stats" style="margin-bottom: 16px;">
          <p><strong>Total de Senhas:</strong> <span id="statTotal">0</span></p>
          <p><strong>Senhas Fracas:</strong> <span id="statWeak">0</span></p>
          <p><strong>Senhas Reutilizadas:</strong> <span id="statReused">0</span></p>
        </div>
        <button id="backToVaultBtn" class="secondary" style="width: 100%;">Voltar ao Cofre</button>
      </section>

      <p id="status" role="status" aria-live="polite"></p>
    </main>

    <script src="popup.js" type="module"></script>
  </body>
</html>
